name: Build and Deploy Apps

on:
  repository_dispatch:
    types: [version-bumped]

jobs:
  check-bump:
    runs-on: ubuntu-latest
    outputs:
      bumped_apps: ${{ steps.extract-apps.outputs.apps }}
      should_build: true  # Always build since dispatch indicates a bump
    steps:
      - name: Extract bumped apps
        id: extract-apps
        run: |
          APPS="${{ github.event.client_payload.apps }}"
          # Convert comma-separated string to JSON array for matrix
          APPS_JSON=$(echo "$APPS" | tr ',' '\n' | sed '/^$/d' | jq -R . | jq -s .)
          echo "apps=$APPS_JSON" >> $GITHUB_OUTPUT

  build-and-push:
    needs: check-bump
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.check-bump.outputs.bumped_apps) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'version = ' "src/apps/${{ matrix.app }}/build.gradle.kts" | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            APP=${{ matrix.app }}
            VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ghcr.io/${{ github.repository }}-${{ matrix.app }}:${{ steps.version.outputs.version }}

  deploy:
    needs: [check-bump, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.check-bump.outputs.bumped_apps) }}
    environment:
      name: production-${{ matrix.app }}
      url: https://github.com/ijskoud/homelab-gitops
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ijskoud/homelab-gitops
          token: ${{ secrets.GITHUB_TOKEN }}
          path: gitops

      - name: Update image tag for ${{ matrix.app }}
        run: |
          cd gitops
          VERSION=$(grep 'version = ' "../src/apps/${{ matrix.app }}/build.gradle.kts" | sed 's/version = "\(.*\)"/\1/')
          sed -i "s|image: ghcr.io/${{ github.repository }}-${{ matrix.app }}:.*|image: ghcr.io/${{ github.repository }}-${{ matrix.app }}:$VERSION|" "apps/${{ github.event.repository.name }}-${{ matrix.app }}/deployment.yaml"

      - name: Commit and push changes for ${{ github.event.repository.name }}-${{ matrix.app }}
        run: |
          cd gitops
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore: update image tag for app: ${{ github.event.repository.name }}-${{ matrix.app }} to $VERSION"
            git push
          else
            echo "No changes to commit for ${{ github.event.repository.name }}-${{ matrix.app }}"
          fi
