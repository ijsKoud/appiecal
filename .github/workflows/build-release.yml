name: Build and Deploy Apps

on:
  push:
    branches:
      - main

jobs:
  check-bump:
    runs-on: ubuntu-latest
    outputs:
      bumped_apps: ${{ steps.extract-apps.outputs.apps }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for version bump
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "chore: bump versions for apps:"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract bumped apps
        id: extract-apps
        if: steps.check.outputs.should_build == 'true'
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          APPS=$(echo "$COMMIT_MSG" | sed -n 's/.*chore: bump versions for apps: \([^ ]*\).*/\1/p' | tr ',' '\n' | xargs)
          echo "apps=$APPS" >> $GITHUB_OUTPUT

  build-and-push:
    needs: check-bump
    if: needs.check-bump.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.check-bump.outputs.bumped_apps) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'version = ' "src/apps/${{ matrix.app }}/build.gradle.kts" | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            APP=${{ matrix.app }}
            VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ghcr.io/${{ github.repository }}-${{ matrix.app }}:${{ steps.version.outputs.version }}

  deploy:
    needs: [check-bump, build-and-push]
    if: needs.check-bump.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.check-bump.outputs.bumped_apps) }}
    environment:
      name: production-${{ matrix.app }}
      url: https://github.com/ijskoud/homelab-gitops
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ijskoud/homelab-gitops
          token: ${{ secrets.GITHUB_TOKEN }}
          path: gitops

      - name: Update image tag for ${{ matrix.app }}
        run: |
          cd gitops
          VERSION=$(grep 'version = ' "../src/apps/${{ matrix.app }}/build.gradle.kts" | sed 's/version = "\(.*\)"/\1/')
          sed -i "s|image: ghcr.io/${{ github.repository }}-${{ matrix.app }}:.*|image: ghcr.io/${{ github.repository }}-${{ matrix.app }}:$VERSION|" "apps/${{ github.event.repository.name }}-${{ matrix.app }}/deployment.yaml"

      - name: Commit and push changes for ${{ github.event.repository.name }}-${{ matrix.app }}
        run: |
          cd gitops
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore: update image tag for app: ${{ github.event.repository.name }}-${{ matrix.app }} to $VERSION"
            git push
          else
            echo "No changes to commit for ${{ github.event.repository.name }}-${{ matrix.app }}"
          fi
