name: Build and Deploy Apps

permissions:
  id-token: write

on:
  repository_dispatch:
    types: [version-bumped]
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated list of app names to build and deploy'
        type: string
        required: true

jobs:
  check-bump:
    runs-on: ubuntu-latest
    outputs:
      bumped_apps: ${{ steps.extract-apps.outputs.apps }}
      should_build: true  # Always build since dispatch indicates a bump
      repo: ${{ steps.set-repo.outputs.repo }}
      event_repo: ${{ steps.set-repo.outputs.event_repo }}
    steps:
      - name: Extract bumped apps
        id: extract-apps
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APPS="${{ github.event.inputs.apps }}"
          else
            APPS="${{ github.event.client_payload.apps }}"
          fi
          APPS_JSON=$(echo "$APPS" | tr ',' '\n' | awk '{$1=$1};1' | sed '/^$/d' | jq -R . | jq -s . | tr -d '\n')
          echo "apps=$APPS_JSON" >> $GITHUB_OUTPUT

      - name: Set lowercase repository names
        id: set-repo
        run: |
          echo "repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "event_repo=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  build-and-push:
    needs: check-bump
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.check-bump.outputs.bumped_apps) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'version = ' "src/apps/${{ matrix.app }}/build.gradle.kts" | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            APP=${{ matrix.app }}
            VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ghcr.io/${{ needs.check-bump.outputs.repo }}-${{ matrix.app }}:${{ steps.version.outputs.version }}

  deploy:
    needs: [check-bump, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.check-bump.outputs.bumped_apps) }}
    environment:
      name: production-${{ matrix.app }}
      url: https://github.com/ijskoud/homelab-gitops
    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Get app version from main repository
        id: version
        run: |
          VERSION=$(grep 'version = ' "main-repo/src/apps/${{ matrix.app }}/build.gradle.kts" | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ijskoud/homelab-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Create or update deployment file for ${{ matrix.app }}
        run: |
          cd gitops
          DEPLOYMENT_DIR="apps/${{ needs.check-bump.outputs.event_repo }}-${{ matrix.app }}"
          DEPLOYMENT_FILE="$DEPLOYMENT_DIR/deployment.yaml"
          mkdir -p "$DEPLOYMENT_DIR"
          if [ ! -f "$DEPLOYMENT_FILE" ]; then
            echo "Creating new deployment file: $DEPLOYMENT_FILE"
            cat > "$DEPLOYMENT_FILE" << EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ matrix.app }}
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${{ matrix.app }}
            template:
              metadata:
                labels:
                  app: ${{ matrix.app }}
              spec:
                containers:
                - name: ${{ matrix.app }}
                  image: ghcr.io/${{ needs.check-bump.outputs.repo }}-${{ matrix.app }}:${{ steps.version.outputs.version }}
                  ports:
                  - containerPort: 8080
          EOF
            echo "Deployment file created successfully"
          else
            echo "Updating existing deployment file: $DEPLOYMENT_FILE"
            sed -i "s|image: ghcr.io/${{ needs.check-bump.outputs.repo }}-${{ matrix.app }}:.*|image: ghcr.io/${{ needs.check-bump.outputs.repo }}-${{ matrix.app }}:${{ steps.version.outputs.version }}|" "$DEPLOYMENT_FILE"
            echo "Deployment file updated successfully"
          fi

      - name: Commit and push changes for ${{ needs.check-bump.outputs.event_repo }}-${{ matrix.app }}
        run: |
          cd gitops
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore: update image tag for app: ${{ needs.check-bump.outputs.event_repo }}-${{ matrix.app }} to ${{ steps.version.outputs.version }}"
            git push
          else
            echo "No changes to commit for ${{ needs.check-bump.outputs.event_repo }}-${{ matrix.app }}"
          fi

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Trigger ArgoCD sync and verify deployment for ${{ matrix.app }}
        run: |
          APP_NAME="${{ needs.check-bump.outputs.event_repo }}-${{ matrix.app }}"
          ARGOCD_URL="${{ secrets.ARGOCD_SERVER_URL }}"
          TOKEN="${{ secrets.ARGOCD_TOKEN }}"
          
          echo "Triggering ArgoCD sync for application: $APP_NAME"
          curl -X POST "$ARGOCD_URL/api/v1/applications/$APP_NAME/sync" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail \
            --silent \
            --show-error
          
          echo "ArgoCD sync triggered. Waiting for deployment to complete..."
          
          # Poll for sync completion
          TIMEOUT=600  # 10 minutes
          INTERVAL=30  # Check every 30 seconds
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESPONSE=$(curl -s "$ARGOCD_URL/api/v1/applications/$APP_NAME" \
              -H "Authorization: Bearer $TOKEN")
          
            SYNC_STATUS=$(echo "$RESPONSE" | jq -r '.status.sync.status')
            HEALTH_STATUS=$(echo "$RESPONSE" | jq -r '.status.health.status')
          
            echo "Sync status: $SYNC_STATUS, Health status: $HEALTH_STATUS (elapsed: ${ELAPSED}s)"
          
            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              echo "✅ Deployment successful! Application $APP_NAME is synced and healthy."
              exit 0
            fi
          
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          echo "❌ Timeout: Deployment did not complete within $TIMEOUT seconds."
          echo "Final status - Sync: $SYNC_STATUS, Health: $HEALTH_STATUS"
          exit 1
