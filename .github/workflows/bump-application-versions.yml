name: Bump Application Versions

on:
  workflow_call:
    inputs:
      apps_dir:
        description: 'Directory containing the apps'
        type: string
        default: 'src/apps'
        required: false
      apps:
        description: 'Comma-separated list of app names to update'
        type: string
        required: true
      bump_type:
        description: 'Type of version bump (major, minor, patch)'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      apps_dir:
        description: 'Directory containing the apps'
        type: string
        default: 'src/apps'
        required: false
      apps:
        description: 'Comma-separated list of app names to update'
        type: string
        required: true
      bump_type:
        description: 'Type of version bump (major, minor, patch)'
        type: choice
        options:
          - major
          - minor
          - patch
        required: true

jobs:
  authenticate-app:
    name: Authenticate GitHub Application
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
  bump-versions:
    needs: authenticate-app
    uses: ijsKoud/actions/.github/workflows/generic-kotlin-monorepo-bump-versions.yaml@main
    with:
      apps_dir: ${{ inputs.apps_dir }}
      apps: ${{ inputs.apps }}
      bump_type: ${{ inputs.bump_type }}
    secrets:
      GITHUB_APP_TOKEN: ${{ needs.authenticate-app.outputs.token }}
